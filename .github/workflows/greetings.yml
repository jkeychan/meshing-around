name: Greetings

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    name: Greet first-time contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d  # v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          pr_message: "Thank you for your pull request!"
